{% extends "base.html" %}

{% block title %}Welcome to ClashPoint{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='create.css') }}"> 

<div class="parent-container">
    <form action="/new_clash" method="POST" class="pure-form pure-form-stacked">
        <label for="title">Title:</label>
        <input type="text" name="title" id="title">

        <label for="description">Description:</label>
        <textarea name="description" id="description"></textarea>

        <label for="tags">Choose a tag/s that describes your Clash:</label>
        <!-- only select one tag -->
        <select id="tags" name="tags">
            {% for tag in tags%}
            <option value="{{ tag.id }}">{{ tag.name }}</option>
            {% endfor %}
        </select>

        <label for="newTag">Didn't see a label that resonated? Add one!</label>
        <input type="text" name="newTag" id="newTag">


        <label for="close_date">When do you want your clash to close?</label>
        <input type="date" name="close_date" id="close_date">

        <button type="submit" class="pure-button pure-button-primary">Create</button>
        <a href="{{ url_for('index') }}" class="pure-button pure-button-primary">Cancel</a>
    </form>

</div>

{% endblock %}
